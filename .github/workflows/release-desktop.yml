name: Release Desktop

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows
            os: windows-latest
          - target: macos
            os: macos-latest
          - target: linux
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Haxe
        uses: ./.github/actions/setup-haxe
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          targets: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvlc-dev libvlccore-dev

      - name: Build game
        run: |
          haxelib run lime build ${{ matrix.target }} -release

      - name: Package build (Windows)
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path export/release/windows/bin/* -DestinationPath FNF-Mod-Windows.zip

      - name: Package build (MacOS)
        if: matrix.target == 'macos'
        run: |
          cd export/release/macos/bin
          zip -r ../../../FNF-Mod-MacOS.zip .

      - name: Package build (Linux)
        if: matrix.target == 'linux'
        run: |
          cd export/release/linux/bin
          zip -r ../../../FNF-Mod-Linux.zip .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-build
          path: FNF-Mod-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-build/FNF-Mod-Windows.zip
            macos-build/FNF-Mod-MacOS.zip
            linux-build/FNF-Mod-Linux.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
